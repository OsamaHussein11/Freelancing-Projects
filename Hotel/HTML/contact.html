<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact us</title>
    <link rel="stylesheet" href="../CSS/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
      <div class="ldiv">
        <h1>HBS</h1>
      </div>
      <div class="rdiv">
        <nav>
          <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="#" class="active">Contact</a></li>
          </ul>
        </nav>
      </div>
      </div>
    </header>
    <main>
      <section id="contact">
        <div class="container">
          <h2><span>Contact</span> Us</h2>
          <p>Please fill out the form below to contact us:</p>
          <form action="" method="get" >
            <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name1" required />
            </div>
            <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email1" required />
            </div>
            <div>
            <label for="message">Message</label>
            <textarea id="message" name="message1" required></textarea>
            </div>
            <input type="submit" value="Submit" class="btn1" />
          </form>
        </div>
      </section>

      <section id ="contact1">
        <div class="container">
        <div>
          <img src="../images/hotel-solid-full1.svg" alt="Location">
          <h4>Location</h4>
          <p>El Gouna, Cairo, Egypt</p>
        </div>
        <div>
          <img src="../images/phone-flip-solid-full.svg" alt="Phone Number">
          <h4>Phone Number</h4>
          <p>+972 59778777</p>
        </div>
        <div>
          <img src="../images/envelope-solid-full.svg" alt="Email Address">
          <h4>Email Address</h4>
          <p>info@hotelbs.com</p>
        </div>
        </div>
      </section>
      
    </main>
    <footer>
      <p> Hotel BS &copy; 2026, All rights reserved</p>
    </footer>
    <script src="../JS/script.js"></script>
  </body>
</html>
